<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40" role="img" aria-label="Yoga with Jahz">
  <!-- Outer circle -->
  <circle cx="20" cy="20" r="18.5" fill="none" stroke="#1E3A3A" stroke-width="1.2"/>
  <!-- Lotus: center petal -->
  <ellipse cx="20" cy="17" rx="3.5" ry="7" fill="#1E3A3A"/>
  <!-- Lotus: left petal -->
  <ellipse cx="14.5" cy="20.5" rx="3.5" ry="6.5" fill="#1E3A3A" opacity="0.75" transform="rotate(-38 14.5 20.5)"/>
  <!-- Lotus: right petal -->
  <ellipse cx="25.5" cy="20.5" rx="3.5" ry="6.5" fill="#1E3A3A" opacity="0.75" transform="rotate(38 25.5 20.5)"/>
  <!-- Lotus: far-left petal -->
  <ellipse cx="10" cy="23" rx="2.5" ry="5.5" fill="#1E3A3A" opacity="0.4" transform="rotate(-65 10 23)"/>
  <!-- Lotus: far-right petal -->
  <ellipse cx="30" cy="23" rx="2.5" ry="5.5" fill="#1E3A3A" opacity="0.4" transform="rotate(65 30 23)"/>
  <!-- Stem -->
  <line x1="20" y1="25" x2="20" y2="31" stroke="#1E3A3A" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Base leaves -->
  <path d="M20 30 Q15 27 12 29" fill="none" stroke="#1E3A3A" stroke-width="1.1" stroke-linecap="round"/>
  <path d="M20 30 Q25 27 28 29" fill="none" stroke="#1E3A3A" stroke-width="1.1" stroke-linecap="round"/>
</svg>
